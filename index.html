<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dylongou — Enlaces</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <header class="profile">
      <img src="assets/mi-foto.jpg" alt="Foto de perfil" class="avatar" id="avatar">
      <h1 class="name">DylonGou</h1>
      <p class="subtitle">Bienvenido a mi página</p>
    </header>

    <section class="links">
      <a class="link" href="https://music.apple.com/mx/playlist/who-i-am/pl.u-yZyVW7LFZZzxy85" id="apple-music" target="_blank" rel="noopener">🎵 Mi playlist en Apple Music</a>
      <a class="link" href="https://www.instagram.com/thashireal/" id="instagram" target="_blank" rel="noopener">📸 Instagram</a>
    </section>

    <section class="about">
      <h2>Sobre mí</h2>
      <p>
        Soy una buena persona y soy gracioso.
      </p>
    </section>

    <section class="easter-egg" id="easterEgg">
      <h2>¡Easter Egg!</h2>
      <p>Encontraste la sección secreta. Eres demasiado curioso, me gusta eso.</p>
      <p>Mensaje secreto: “La mejor página siempre está en construcción.”</p>
    </section>
  </main>

  <script>
    const avatar = document.getElementById('avatar');
    const egg = document.getElementById('easterEgg');
    let clicks = 0;

    // Reset easter egg on page load
    window.addEventListener('load', () => {
      egg.classList.remove('visible');
      clicks = 0;
    });

    avatar.addEventListener('click', () => {
      clicks += 1;
      if (clicks >= 5) {
        egg.classList.toggle('visible');
        clicks = 0;
      }
    });
  </script>
</body>
</html>
